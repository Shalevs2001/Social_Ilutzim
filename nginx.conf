server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/shift-scheduler;
    index index.html;

    # SPA routing — כל נתיב מוגש מ-index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache ל-assets סטטיים (JS/CSS)
    location ~* \.(js|css|woff2?|svg|ico|png|jpg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
